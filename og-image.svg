<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0C0C0B"/>
            <stop offset="1" stop-color="#1A1918"/>
        </linearGradient>
        <radialGradient id="glow" cx="0.2" cy="0.2" r="0.7">
            <stop offset="0" stop-color="#FF6B00" stop-opacity="0.35"/>
            <stop offset="1" stop-color="#FF6B00" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glow2" cx="0.85" cy="0.15" r="0.6">
            <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.30"/>
            <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#FF6B00"/>
            <stop offset="1" stop-color="#FFB066"/>
        </linearGradient>
        <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.32"/>
            <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#glow)"/>
    <rect width="1200" height="630" fill="url(#glow2)"/>

    <!-- Brand mark — "Aurora Badge" (same glyph as favicon.svg) -->
    <g transform="translate(96 96) scale(1.3125) translate(-2 -2)">
        <rect x="2" y="2" width="60" height="60" rx="14.5" fill="url(#badge)"/>
        <rect x="2" y="2" width="60" height="30" rx="14.5" fill="url(#shine)"/>
        <g fill="none" stroke="#14100C" stroke-width="7" stroke-linecap="round">
            <path d="M30.7 24 A10.5 10.5 0 1 0 30.7 40"/>
            <path d="M49 23.3 A5.5 5.5 0 1 0 44.5 32 A5.5 5.5 0 1 1 40 40.7"/>
        </g>
    </g>
    <text x="208" y="156"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, sans-serif"
          font-size="40" font-weight="800" fill="#F2EDE7" letter-spacing="-1.5">Casy Studio</text>

    <!-- Headline -->
    <text x="96" y="360"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, sans-serif"
          font-size="84" font-weight="900" fill="#F2EDE7" letter-spacing="-2.5">Small apps,</text>
    <text x="96" y="456"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, sans-serif"
          font-size="84" font-weight="900" fill="#FF6B00" letter-spacing="-2.5">made with care.</text>

    <!-- Lede -->
    <text x="96" y="528"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, sans-serif"
          font-size="28" font-weight="500" fill="#A39E98" letter-spacing="-0.5">Calm, focused tools for iOS, macOS and Apple Watch.</text>

    <!-- URL -->
    <text x="96" y="572"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, sans-serif"
          font-size="22" font-weight="600" fill="#FF8324" letter-spacing="0.5">casystudioco.com</text>
</svg>
