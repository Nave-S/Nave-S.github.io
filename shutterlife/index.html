<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'">
    <meta name="referrer" content="no-referrer">
    <meta name="color-scheme" content="dark light">

    <!-- App-folder deep link: there is no standalone app page here (only the
         legal sub-pages live under /shutterlife/). The folder root forwards to
         the landing with the app pre-selected: /?app=shutterlife highlights
         ShutterLife at the top of the grid. See README → "App-Deep-Link". -->
    <title>ShutterLife — Casy Studio</title>
    <meta name="robots" content="noindex, follow">
    <meta http-equiv="refresh" content="0; url=../?app=shutterlife">
    <link rel="canonical" href="https://nave-s.github.io/?app=shutterlife">

    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <style>
        html { color-scheme: dark light; }
        body {
            margin: 0; min-height: 100vh;
            display: grid; place-items: center;
            font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: #0A0908; color: #FAF7F2;
            text-align: center; padding: 2rem;
        }
        @media (prefers-color-scheme: light) { body { background: #FAF7F2; color: #0A0908; } }
        a { color: #FF6B00; font-weight: 600; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
    <script>
        // Immediate client-side redirect (relative → works on any host).
        location.replace("../?app=shutterlife");
    </script>
</head>
<body>
    <p>Redirecting to <a href="../?app=shutterlife">Casy Studio → ShutterLife</a>…</p>
</body>
</html>
