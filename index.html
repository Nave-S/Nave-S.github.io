<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nave-S Apps</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Apps</h1>
        <p class="subtitle">Legal, Privacy & Support</p>

        <div class="app-grid" id="app-grid">
            <!-- Apps werden automatisch aus config.json geladen -->
        </div>

        <footer>&copy; 2026 Nave-S. All rights reserved.</footer>
    </div>

    <script>
        // App-Definitionen
        const apps = {
            sequenz:        { name: "SQNZ / Sequenz",             tagline: "Interval Timer for iOS & Apple Watch",  folder: "sequenz" },
            talktome:       { name: "TalkToMe",          tagline: "macOS Communication App",               folder: "talktome" },
            clearmind:      { name: "ClearMind",         tagline: "Focus & Mindfulness",                   folder: "clearmind" },
            elektohub:      { name: "ElektoHub",         tagline: "Smart Home Management",                 folder: "elektohub" },
            feiertagswarner:{ name: "FeiertagsWarner",   tagline: "Holiday Notifications for Germany",     folder: "feiertagswarner" },
            finanzen:       { name: "Finanzen",          tagline: "Personal Finance Tracker",              folder: "finanzen" },
            riseup:         { name: "RiseUp",            tagline: "Motivation & Habits",                   folder: "riseup" },
            spindtracker:   { name: "SpindTracker",      tagline: "Locker Management",                    folder: "spindtracker" },
            shutterlife:    { name: "ShutterLife",       tagline: "Photography App",                       folder: "shutterlife" },
            trynk:          { name: "Trynk",             tagline: "Social Drinks & Nightlife",             folder: "trynk" },
            shutterlifeweb: { name: "ShutterLife Web",   tagline: "Web Platform for ShutterLife",          folder: "shutterlife-web" },
            clearlist:      { name: "ClearList",         tagline: "Simple Task Management",                folder: "clearlist" },
        };

        // Config laden und Apps anzeigen
        fetch("config.json")
            .then(r => r.json())
            .then(config => {
                const grid = document.getElementById("app-grid");
                for (const [key, enabled] of Object.entries(config)) {
                    if (enabled && apps[key]) {
                        const app = apps[key];
                        grid.innerHTML += `
                            <div class="app-card">
                                <h3>${app.name}</h3>
                                <p class="tagline">${app.tagline}</p>
                                <div class="links">
                                    <a href="${app.folder}/privacy">Privacy</a>
                                    <a href="${app.folder}/terms">Terms</a>
                                    <a href="${app.folder}/support">Support</a>
                                </div>
                            </div>
                        `;
                    }
                }
                if (!grid.innerHTML.trim()) {
                    grid.innerHTML = '<p style="color:#5C5854">No apps published yet.</p>';
                }
            });
    </script>
</body>
</html>
