<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasyStudioCo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <a href="." class="active" id="lang-en" onclick="setLang('en');return false">EN</a>
            <a href="#" id="lang-de" onclick="setLang('de');return false">DE</a>
        </div>
        <p class="welcome" id="welcome">Welcome to</p>
        <h1 id="brand">CasyStudioCo</h1>
        <h2 class="section-title" id="title">Our Apps</h2>
        <p class="subtitle" id="subtitle">We build apps that help you move, focus, and get things done. Here you'll find everything about our apps, your data, and how to reach us.</p>

        <div class="app-grid" id="app-grid">
            <!-- Apps werden automatisch aus config.json geladen -->
        </div>

        <footer>
            <p>Questions? <a href="mailto:casystudioco@gmail.com" style="color:#FF6B00;text-decoration:none">casystudioco@gmail.com</a></p>
            <p style="margin-top:8px"><a href="shutterlife/impressum/" id="footer-impressum" style="color:#FF6B00;text-decoration:none">Legal Notice / Impressum</a></p>
            <p style="margin-top:8px">&copy; 2026 CasyStudioCo. All rights reserved.</p>
        </footer>
    </div>

    <script>
        const i18n = {
            en: {
                welcome: "Welcome to",
                title: "Our Apps",
                subtitle: "We build apps that help you move, focus, and get things done. Here you'll find everything about our apps, your data, and how to reach us.",
                privacy: "Privacy Policy",
                terms: "Terms of Service",
                support: "Support & FAQ",
                empty: "No apps published yet.",
                contact: "Questions?",
                rights: "All rights reserved.",
                privacySuffix: "",
                termsSuffix: "",
                supportSuffix: "",
                impressum: "Legal Notice",
                impressumSuffix: "",
            },
            de: {
                welcome: "Willkommen bei",
                title: "Unsere Apps",
                subtitle: "Wir entwickeln Apps, die dir helfen, dich zu bewegen, zu fokussieren und produktiv zu sein. Hier findest du alles zu unseren Apps, deinen Daten und wie du uns erreichst.",
                privacy: "Datenschutz",
                terms: "Nutzungsbedingungen",
                support: "Support & FAQ",
                empty: "Noch keine Apps veröffentlicht.",
                contact: "Fragen?",
                rights: "Alle Rechte vorbehalten.",
                privacySuffix: "/de.html",
                termsSuffix: "/de.html",
                supportSuffix: "/de.html",
                impressum: "Impressum",
                impressumSuffix: "/de.html",
            }
        };

        const apps = {
            sequenz:        { name: "SQNZ / Sequenz",   en: "Build, run, and master interval timers for any workout.",           de: "Erstelle und steuere Intervall-Timer für jedes Training.",         platform: "iOS & Apple Watch", folder: "sequenz",     appStore: "https://apps.apple.com/app/sequenz" },
            shutterlife:    { name: "ShutterLife",       en: "Read and track the shutter count of your camera from photos.",     de: "Lese und verfolge den Auslösezähler deiner Kamera aus Fotos.",     platform: "iOS & macOS",        folder: "shutterlife", appStore: "https://apps.apple.com/app/shutterlife" },
            talktome:       { name: "TalkToMe",          en: "Accessible communication for people who need a voice.",             de: "Barrierefreie Kommunikation für Menschen die eine Stimme brauchen.", platform: "macOS",          folder: "talktome" },
            clearmind:      { name: "ClearMind",         en: "Simple tools for focus, breathing, and mindfulness.",               de: "Einfache Tools für Fokus, Atmung und Achtsamkeit.",               platform: "iOS",               folder: "clearmind" },
            elektohub:      { name: "ElektoHub",         en: "Manage and monitor your smart home devices in one place.",          de: "Verwalte und überwache deine Smart-Home-Geräte an einem Ort.",    platform: "iOS",               folder: "elektohub" },
            feiertagswarner:{ name: "FeiertagsWarner",   en: "Never miss a German holiday. Get notified ahead of time.",          de: "Verpasse keinen Feiertag. Werde rechtzeitig erinnert.",           platform: "iOS",               folder: "feiertagswarner" },
            finanzen:       { name: "Finanzen",          en: "Track your income, expenses, and savings at a glance.",             de: "Behalte Einnahmen, Ausgaben und Ersparnisse im Blick.",           platform: "iOS",               folder: "finanzen" },
            riseup:         { name: "RiseUp",            en: "Daily motivation and habit tracking to keep you going.",            de: "Tägliche Motivation und Gewohnheits-Tracking.",                   platform: "iOS",               folder: "riseup" },
            spindtracker:   { name: "SpindTracker",      en: "Keep track of your locker assignments and access codes.",           de: "Behalte deine Spind-Zuweisungen und Zugangscodes im Blick.",      platform: "iOS",               folder: "spindtracker" },
            trynk:          { name: "Trynk",             en: "Discover drinks, bars, and nightlife with friends.",                de: "Entdecke Drinks, Bars und Nachtleben mit Freunden.",              platform: "iOS",               folder: "trynk" },
            shutterlifeweb: { name: "ShutterLife Web",   en: "The web companion for your ShutterLife photo library.",             de: "Die Web-Plattform für deine ShutterLife-Fotobibliothek.",         platform: "Web",               folder: "shutterlife-web" },
            clearlist:      { name: "ClearList",         en: "A clean, simple to-do list that stays out of your way.",            de: "Eine saubere, einfache To-Do-Liste die dich nicht stört.",        platform: "iOS",               folder: "clearlist" },
        };

        let currentLang = "en";

        function setLang(lang) {
            currentLang = lang;
            document.getElementById("lang-en").classList.toggle("active", lang === "en");
            document.getElementById("lang-de").classList.toggle("active", lang === "de");
            document.getElementById("welcome").textContent = i18n[lang].welcome;
            document.getElementById("title").textContent = i18n[lang].title;
            document.getElementById("subtitle").textContent = i18n[lang].subtitle;
            renderApps();
        }

        function renderApps() {
            const lang = currentLang;
            const t = i18n[lang];
            fetch("config.json")
                .then(r => r.json())
                .then(config => {
                    const grid = document.getElementById("app-grid");
                    grid.innerHTML = "";
                    for (const [key, enabled] of Object.entries(config)) {
                        if (enabled && apps[key]) {
                            const app = apps[key];
                            grid.innerHTML += `
                                <div class="app-card">
                                    <div style="display:flex;justify-content:space-between;align-items:center">
                                        <h3>${app.name}</h3>
                                        <span class="platform-badge">${app.platform}</span>
                                    </div>
                                    <p class="tagline">${app[lang]}</p>
                                    <div class="links">
                                        <a href="${app.folder}/privacy${t.privacySuffix}">${t.privacy}</a>
                                        <a href="${app.folder}/terms${t.termsSuffix}">${t.terms}</a>
                                        <a href="${app.folder}/support${t.supportSuffix}">${t.support}</a>
                                        <a href="${app.folder}/impressum${t.impressumSuffix}">${t.impressum}</a>
                                        ${app.appStore ? `<a href="${app.appStore}" class="store-link">App Store ↗</a>` : ""}
                                    </div>
                                </div>
                            `;
                        }
                    }
                    if (!grid.innerHTML.trim()) {
                        grid.innerHTML = `<p style="color:#5C5854">${t.empty}</p>`;
                    }
                });
        }

        // Initial laden
        renderApps();
    </script>
</body>
</html>
